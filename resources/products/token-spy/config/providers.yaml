# Token Spy Provider Configuration
# This file defines all LLM providers, their endpoints, and pricing.
# Edit this to add new providers or customize pricing for your negotiated rates.

providers:
  # ============================================
  # Anthropic — Claude Models
  # ============================================
  anthropic:
    name: "Anthropic"
    adapter: anthropic_messages  # Built-in adapter
    base_url: "https://api.anthropic.com"
    api_version: "2023-06-01"
    
    # Authentication
    auth:
      type: header
      header_name: "x-api-key"
    
    # Model pricing per 1M tokens (USD)
    # Format: {input, output, cache_read, cache_write}
    models:
      claude-opus-4-6:
        name: "Claude Opus 4.6"
        input: 5.00
        output: 25.00
        cache_read: 0.50
        cache_write: 6.25
        context_window: 200000
      claude-opus-4-5:
        name: "Claude Opus 4.5"
        input: 5.00
        output: 25.00
        cache_read: 0.50
        cache_write: 6.25
        context_window: 200000
      claude-opus-4-1:
        name: "Claude Opus 4.1"
        input: 15.00
        output: 75.00
        cache_read: 1.50
        cache_write: 18.75
        context_window: 200000
      claude-opus-4:
        name: "Claude Opus 4"
        input: 15.00
        output: 75.00
        cache_read: 1.50
        cache_write: 18.75
        context_window: 200000
      claude-sonnet-4:
        name: "Claude Sonnet 4"
        input: 3.00
        output: 15.00
        cache_read: 0.30
        cache_write: 3.75
        context_window: 200000
      claude-haiku-4-5:
        name: "Claude Haiku 4.5"
        input: 1.00
        output: 5.00
        cache_read: 0.10
        cache_write: 1.25
        context_window: 200000
      claude-haiku-3-5:
        name: "Claude Haiku 3.5"
        input: 0.80
        output: 4.00
        cache_read: 0.08
        cache_write: 1.00
        context_window: 200000
      claude-haiku:
        name: "Claude Haiku"
        input: 0.80
        output: 4.00
        cache_read: 0.08
        cache_write: 1.00
        context_window: 200000

  # ============================================
  # OpenAI — GPT Models
  # ============================================
  openai:
    name: "OpenAI"
    adapter: openai_chat  # Built-in adapter
    base_url: "https://api.openai.com"
    
    auth:
      type: header
      header_name: "authorization"
      header_prefix: "Bearer "
    
    models:
      gpt-4o:
        name: "GPT-4o"
        input: 2.50
        output: 10.00
        cache_read: 1.25  # Cached input pricing
        cache_write: 0.00  # No separate cache write
        context_window: 128000
      gpt-4o-mini:
        name: "GPT-4o Mini"
        input: 0.15
        output: 0.60
        cache_read: 0.075
        cache_write: 0.00
        context_window: 128000
      gpt-4-turbo:
        name: "GPT-4 Turbo"
        input: 10.00
        output: 30.00
        cache_read: 0.00
        cache_write: 0.00
        context_window: 128000
      gpt-4:
        name: "GPT-4"
        input: 30.00
        output: 60.00
        cache_read: 0.00
        cache_write: 0.00
        context_window: 8192
      gpt-3.5-turbo:
        name: "GPT-3.5 Turbo"
        input: 0.50
        output: 1.50
        cache_read: 0.00
        cache_write: 0.00
        context_window: 16385

  # ============================================
  # Moonshot (Kimi) — OpenAI-compatible
  # ============================================
  moonshot:
    name: "Moonshot AI"
    adapter: openai_chat
    base_url: "https://api.moonshot.ai/v1"
    
    auth:
      type: header
      header_name: "authorization"
      header_prefix: "Bearer "
    
    # Role mapping for compatibility
    request_transforms:
      - type: role_map
        mapping:
          developer: system  # Moonshot doesn't support 'developer' role
    
    models:
      kimi-k2-5:
        name: "Kimi K2.5"
        input: 0.50
        output: 2.00
        cache_read: 0.00
        cache_write: 0.00
        context_window: 256000
      kimi-k2:
        name: "Kimi K2"
        input: 0.50
        output: 2.00
        cache_read: 0.00
        cache_write: 0.00
        context_window: 256000
      kimi-k1-5:
        name: "Kimi K1.5"
        input: 0.30
        output: 1.20
        cache_read: 0.00
        cache_write: 0.00
        context_window: 128000

  # ============================================
  # Groq — Fast Inference
  # ============================================
  groq:
    name: "Groq"
    adapter: openai_chat
    base_url: "https://api.groq.com/openai/v1"
    
    auth:
      type: header
      header_name: "authorization"
      header_prefix: "Bearer "
    
    models:
      llama-3.1-405b-reasoning:
        name: "Llama 3.1 405B"
        input: 0.50
        output: 0.50
        cache_read: 0.00
        cache_write: 0.00
        context_window: 128000
      llama-3.1-70b-versatile:
        name: "Llama 3.1 70B"
        input: 0.15
        output: 0.25
        cache_read: 0.00
        cache_write: 0.00
        context_window: 128000
      mixtral-8x7b-32768:
        name: "Mixtral 8x7B"
        input: 0.10
        output: 0.10
        cache_read: 0.00
        cache_write: 0.00
        context_window: 32768

  # ============================================
  # Local vLLM — Self-hosted
  # ============================================
  vllm:
    name: "Local vLLM"
    adapter: openai_chat
    base_url: "${VLLM_BASE_URL:-http://localhost:8000/v1}"
    
    auth:
      type: none  # Local inference, no auth needed
    
    # Pricing is $0 for local inference
    models:
      "*":  # Wildcard matches any model name
        name: "Local Model"
        input: 0.00
        output: 0.00
        cache_read: 0.00
        cache_write: 0.00
        context_window: 128000

  # ============================================
  # DeepSeek
  # ============================================
  deepseek:
    name: "DeepSeek"
    adapter: openai_chat
    base_url: "https://api.deepseek.com"
    
    auth:
      type: header
      header_name: "authorization"
      header_prefix: "Bearer "
    
    models:
      deepseek-chat:
        name: "DeepSeek Chat"
        input: 0.14
        output: 0.28
        cache_read: 0.014  # Very cheap cached input
        cache_write: 0.00
        context_window: 64000
      deepseek-reasoner:
        name: "DeepSeek Reasoner"
        input: 0.50
        output: 1.00
        cache_read: 0.05
        cache_write: 0.00
        context_window: 64000

  # ============================================
  # Azure OpenAI
  # ============================================
  azure:
    name: "Azure OpenAI"
    adapter: openai_chat
    base_url: "${AZURE_OPENAI_ENDPOINT}"
    
    auth:
      type: header
      header_name: "api-key"
    
    request_transforms:
      - type: header_add
        headers:
          api-version: "2024-02-01"
    
    # Pricing varies by deployment, override in your config
    models:
      gpt-4:
        name: "GPT-4"
        input: 30.00
        output: 60.00
        cache_read: 0.00
        cache_write: 0.00
        context_window: 8192

# ============================================
# Global Settings
# ============================================
settings:
  # Default provider if not specified
  default_provider: anthropic
  
  # Rate limiting defaults
  default_rate_limit_rpm: 60
  default_rate_limit_rpd: 10000
  
  # Cost alerting
  cost_alert_threshold_usd: 10.00  # Alert at $10/hour
  
  # Session management
  default_session_char_limit: 200000
  session_poll_interval_minutes: 5
  
  # Data retention (days)
  retention_raw_days: 30
  retention_hourly_days: 365

# ============================================
# Adapter Definitions
# ============================================
adapters:
  anthropic_messages:
    name: "Anthropic Messages API"
    request_format: anthropic
    response_format: anthropic
    streaming: true
    sse_event_types: true
    
  openai_chat:
    name: "OpenAI Chat Completions API"
    request_format: openai
    response_format: openai
    streaming: true
    sse_event_types: false
