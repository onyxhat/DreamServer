version: "3.8"

services:
  # ============================================
  # Token Spy Proxy (Phase 1 — TimescaleDB Edition)
  # ============================================
  token-spy:
    build: .
    container_name: token-spy
    ports:
      - "${TOKEN_SPY_PORT:-9110}:9110"
    environment:
      # Database
      - DATABASE_URL=postgresql://token_spy:${POSTGRES_PASSWORD}@postgres:5432/token_spy
      - DATABASE_TYPE=timescaledb
      
      # Legacy SQLite path (for migration)
      - SQLITE_DB_PATH=/app/data/usage.db
      
      # Configuration
      - CONFIG_PATH=/app/config/providers.yaml
      - SETTINGS_PATH=/app/data/settings.json
      
      # Security
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      
      # Default provider (fallback)
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-anthropic}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - token-spy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9110/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # PostgreSQL + TimescaleDB
  # ============================================
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: token-spy-db
    environment:
      - POSTGRES_USER=token_spy
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=token_spy
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    networks:
      - token-spy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U token_spy -d token_spy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # Database Migrations
  # ============================================
  migrate:
    build: .
    container_name: token-spy-migrate
    command: >
      sh -c "
        echo 'Waiting for PostgreSQL...' &&
        sleep 5 &&
        echo 'Running migrations...' &&
        python -m migrations.apply_migrations &&
        echo 'Migrations complete'
      "
    environment:
      - DATABASE_URL=postgresql://token_spy:${POSTGRES_PASSWORD}@postgres:5432/token_spy
    volumes:
      - ./schema:/app/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - token-spy
    restart: "no"

  # ============================================
  # Optional: SQLite Migration (one-time)
  # ============================================
  migrate-sqlite:
    build: .
    container_name: token-spy-migrate-sqlite
    profiles: ["migrate"]  # Only run when explicitly requested
    command: >
      sh -c "
        echo 'Migrating from SQLite to TimescaleDB...' &&
        python migrations/migrate_sqlite_to_timescale.py 
          --sqlite-path /app/data/usage.db 
          --postgres-url postgresql://token_spy:${POSTGRES_PASSWORD}@postgres:5432/token_spy
      "
    environment:
      - DATABASE_URL=postgresql://token_spy:${POSTGRES_PASSWORD}@postgres:5432/token_spy
    volumes:
      - ./data:/app/data
      - ./migrations:/app/migrations:ro
    depends_on:
      - postgres
      - migrate
    networks:
      - token-spy
    restart: "no"

  # ============================================
  # Session Manager (Auto-reset service)
  # ============================================
  session-manager:
    build: .
    container_name: token-spy-session-manager
    command: python session_manager.py
    environment:
      - DATABASE_URL=postgresql://token_spy:${POSTGRES_PASSWORD}@postgres:5432/token_spy
      - POLL_INTERVAL_MINUTES=${POLL_INTERVAL_MINUTES:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - token-spy
    networks:
      - token-spy
    restart: unless-stopped

  # ============================================
  # Grafana (Optional: Advanced Dashboards)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: token-spy-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - postgres
    networks:
      - token-spy
    restart: unless-stopped
    profiles: ["grafana"]  # Only run when explicitly requested

  # ============================================
  # Redis (Optional: Rate limiting, caching)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: token-spy-redis
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - token-spy
    restart: unless-stopped
    profiles: ["redis"]  # Only run when explicitly requested

volumes:
  postgres_data:
    driver: local
  grafana_data:
    driver: local
  redis_data:
    driver: local

networks:
  token-spy:
    driver: bridge
