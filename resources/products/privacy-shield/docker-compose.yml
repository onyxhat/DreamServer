# M3 Privacy Shield - Local Development
version: '3.8'

services:
  privacy-shield:
    build: .
    ports:
      - "5000:5000"
    environment:
      - LOCAL_LLM_URL=http://host.docker.internal:8000
      - PRIVACY_MODE=on
      - MIN_PII_SCORE=0.4
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s  # Presidio + spacy takes time to load
    restart: unless-stopped
